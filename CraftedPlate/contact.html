<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | The Crafted Plate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.png.png" type="image/png">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

/* BODY */
body {
  font-family:'Montserrat', sans-serif;
  color:#f0f0f0;
  background: url('background-image-2.png.png') no-repeat center center fixed;
  background-size: cover;
  overflow-x:hidden;
}
body::before {
  content:"";
  position:fixed;
  top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.55);
  z-index:-1;
}

/* HEADER */
header {
  display:flex; justify-content:space-between; align-items:center;
  padding:25px 60px;
}
.logo {
  font-family:'Cinzel', serif; font-size:32px; letter-spacing:3px;
}

/* NAV */
nav { position:relative; }
nav button {
  background:rgba(30,30,30,0.85);
  color:#f0f0f0;
  font-size:16px;
  padding:10px 20px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-family:'Montserrat', sans-serif;
}
nav button:hover { background:rgba(30,30,30,1); }
.dropdown-content {
  display:none;
  position:absolute;
  right:0;
  background:rgba(30,30,30,0.95);
  min-width:160px;
  border-radius:12px;
  overflow:hidden;
  margin-top:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.5);
}
.dropdown-content a {
  display:block;
  color:#f0f0f0;
  text-decoration:none;
  padding:12px 20px;
  font-size:15px;
  transition:0.3s;
}
.dropdown-content a:hover { background:rgba(50,50,50,0.9); }

/* CONTACT CARD */
.contact-card {
  max-width:700px;
  margin:80px auto;
  background:rgba(30,30,30,0.9);
  padding:40px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.7);
}
.contact-card h1 {
  font-family:'Cinzel', serif;
  font-size:32px;
  text-align:center;
  margin-bottom:20px;
}
.contact-card p { color:#ccc; line-height:1.7; margin-bottom:20px; }
.contact-card form { display:flex; flex-direction:column; gap:15px; }
.contact-card input, .contact-card textarea {
  padding:12px 15px;
  border-radius:12px;
  border:none;
  background: rgba(50,50,50,0.85);
  color:#f0f0f0;
  font-family:'Montserrat', sans-serif;
  font-size:14px;
  resize:none;
}
.contact-card input::placeholder, .contact-card textarea::placeholder {
  color:#aaa;
}
.contact-card button {
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#7e7e7e;
  color:#000;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}
.contact-card button:hover { background:#e0e0e0; }

/* FOOTER */
footer {
  text-align:center;
  padding:30px;
  font-size:14px;
  color:#ccc;
  margin-top:40px;
}

/* MOBILE */
@media(max-width:768px){
  header { padding:20px; }
  .contact-card { margin:60px 20px; padding:30px; }
}
</style>
</head>

<body>

<header>
<div class="logo">The Crafted Plate</div>
<nav>
<button onclick="toggleDropdown()">Menu &#9662;</button>
<div class="dropdown-content" id="dropdown">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="recipes.html">Recipes</a>
<a href="special.html">Special</a>
<a href="contact.html">Contact</a>
<a href="privacy.html">Privacy Policy</a>
</div>
</nav>
</header>

<section class="contact-card">
<h1>Contact Us</h1>
<p>We would love to hear from you! Fill out the form below and we will get back to you as soon as possible.</p>

<form action="https://formspree.io/f/xreykqaz" method="POST">
  <input type="text" name="name" placeholder="Your Name" required>
  <input type="email" name="_replyto" placeholder="Your Email" required>
  <textarea name="message" rows="6" placeholder="Your Message" required></textarea>
  <button type="submit">Send Message</button>
</form>
</section>

<footer>
© 2026 The Crafted Plate
</footer>

<script>
function toggleDropdown(){
  const dropdown=document.getElementById("dropdown");
  dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
