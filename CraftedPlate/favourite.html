<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saved Recipes | The Crafted Plate</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

/* SAME BACKGROUND AS MAIN SITE */
body {
  font-family:'Montserrat', sans-serif;
  color:#f0f0f0;
  background: url('background-image-2.png.png') no-repeat center center fixed;
  background-size: cover;
  overflow-x:hidden;
}

body::before {
  content:"";
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.55);
  z-index:-1;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px 60px;
}

.logo{
  font-family:'Cinzel', serif;
  font-size:32px;
  letter-spacing:3px;
}

/* HERO */
.hero {
  text-align:center;
  padding:100px 20px 40px;
}

.hero h1 {
  font-size:42px;
}

.hero p {
  opacity:0.7;
}

/* GRID */
.grid {
  display:flex;
  flex-wrap:wrap;
  gap:30px;
  justify-content:center;
  padding:40px 20px 80px;
}

/* SAME CARD STYLE */
.recipe-card {
  position: relative;
  width: 260px;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  background: #111;
  transition: 0.4s;
}

.recipe-card img {
  width:100%;
  height:320px;
  object-fit:cover;
}

.recipe-card::after {
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:60%;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

.recipe-card h3 {
  position:absolute;
  bottom:15px;
  left:15px;
  font-family:'Cinzel', serif;
}

/* HOVER */
.recipe-card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* EMPTY STATE */
.empty {
  text-align:center;
  opacity:0.6;
  margin-top:50px;
  font-size:18px;
}

</style>
</head>

<body>

<header>
  <div class="logo">The Crafted Plate</div>
</header>

<section class="hero">
  <h1>Saved Recipes ❤️</h1>
  <p>Your personal collection of favorites</p>
</section>

<div class="grid" id="favoritesContainer"></div>
<p id="emptyMsg" class="empty"></p>

<script>

const recipeData = {
  spaghetti_bolognese: {img:"spaghetti-bolognese.png.png.png", title:"Spaghetti Bolognese"},
  steak: {img:"steak .png.png", title:"Steak"},
  chicken_tacos: {img:"chicken-tacos.png(1).png", title:"Chicken Tacos"},
  avocado_toast: {img:"avocado.png.png.png", title:"Avocado Toast"},
  // 👉 ADD MORE (important for full system)
};

const container = document.getElementById("favoritesContainer");
const emptyMsg = document.getElementById("emptyMsg");

const favorites = JSON.parse(localStorage.getItem("favorites")) || [];

if(favorites.length === 0){
  emptyMsg.textContent = "No saved recipes yet.";
} else {

  favorites.forEach(id => {

    const data = recipeData[id];
    if(!data) return;

    const card = document.createElement("div");
    card.className = "recipe-card";

    card.innerHTML = `
      <img src="${data.img}" alt="${data.title}">
      <h3>${data.title}</h3>
    `;

    container.appendChild(card);
  });

}

</script>

</body>
</html>
